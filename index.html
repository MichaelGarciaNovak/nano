            <div className="tef-actions">
              <button className="form-btn" style={{fontSize:'.72rem',padding:'6px 14px'}} onClick={addTask}>Agregar</button>
              <button className="form-btn-ghost" style={{fontSize:'.72rem',padding:'6px 10px'}} onClick={()=>setOpen(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      ) : (
        <button className="add-task-trigger" onClick={()=>setOpen(true)}>+ Nueva acción</button>
      )}
    </div>
  );
}

function ReviewTaskAdder({ sourceTaskId, sprint, sp, tasks, setTasks }) {
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({ titulo:'', descripcion:'', responsable:'', fecha:'' });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const rev = (sprint.taskReviews||{})[sourceTaskId] || {};
  const linkedIds = rev.accionIds || [];
  const linkedTasks = tasks.filter(t => linkedIds.includes(t.id));

  function addTask() {
    if (!form.titulo.trim()) return;
    const newId = uid();
    const newTask = { id:newId, status:'backlog', ...form };
    setTasks(ts => [...ts, newTask]);
    sp('taskReviews')({
      ...(sprint.taskReviews||{}),
      [sourceTaskId]: { ...rev, accionIds: [...linkedIds, newId] }
    });
    setForm({ titulo:'', descripcion:'', responsable:'', fecha:'' });
    setOpen(false);
  }
  function updateTask(id, changes) { setTasks(ts => ts.map(t => t.id===id ? {...t,...changes} : t)); }
  function deleteTask(id) {
    setTasks(ts => ts.filter(t => t.id!==id));
    sp('taskReviews')({
      ...(sprint.taskReviews||{}),
      [sourceTaskId]: { ...rev, accionIds: linkedIds.filter(i => i!==id) }
    });
  }

  return (
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {linkedTasks.map(t => (
        <LinkedTaskCard key={t.id} task={t} onUpdate={updateTask} onDelete={deleteTask} />
      ))}
      {open ? (
        <div className="task-card expanded">
          <div className="task-edit-form">
            <div><div className="tef-label">Título *</div>
              <input className="tef-input" autoFocus value={form.titulo} onChange={e=>f('titulo',e.target.value)} onKeyDown={e=>e.key==='Enter'&&addTask()} placeholder="Título de la tarea" />
            </div>
            <div><div className="tef-label">Descripción</div>
              <textarea className="tef-input" rows={2} style={{resize:'vertical'}} value={form.descripcion} onChange={e=>f('descripcion',e.target.value)} placeholder="Opcional…" />
            </div>
            <div className="tef-row">
              <div><div className="tef-label">Responsable</div>
                <input list="team-list" className="tef-input" value={form.responsable} onChange={e=>f('responsable',e.target.value)} />
              </div>
              <div><div className="tef-label">Fecha límite</div>
                <input type="date" className="tef-input" value={form.fecha} onChange={e=>f('fecha',e.target.value)} />
              </div>
            </div>
            <div className="tef-actions">
              <button className="form-btn" style={{fontSize:'.72rem',padding:'6px 14px'}} onClick={addTask}>Agregar al backlog</button>
              <button className="form-btn-ghost" style={{fontSize:'.72rem',padding:'6px 10px'}} onClick={()=>setOpen(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      ) : (
        <button className="add-task-trigger" onClick={()=>setOpen(true)}>+ Nueva tarea al backlog</button>
      )}
    </div>
  );
}

function NextActionInput({ sprint, sp }) {
  const [txt, setTxt] = useState('');
  function add() {
    if (!txt.trim()) return;
    sp('reviewNextActions')([...(sprint.reviewNextActions||[]), {text:txt.trim(), done:false}]);
    setTxt('');
  }
  return (
    <div style={{display:'flex',gap:6,marginTop:8}}>
      <input
        className="tef-input"
        placeholder="+ Nueva acción…"
        value={txt}
        onChange={e=>setTxt(e.target.value)}
        onKeyDown={e=>{ if(e.key==='Enter') add(); }}
      />
      <button className="form-btn" style={{fontSize:'.72rem',padding:'6px 12px',whiteSpace:'nowrap'}} onClick={add}>Agregar</button>
    </div>
  );
}

/* ── Sprint Board ── */
function SprintBoard({ tasks, setTasks, colonias, setColonias, team, sprint, setSprint }) {
  const [sprintTab, setSprintTab] = useState('kanban');

  const [dragOver, setDragOver] = useState(null);
  const dragRef = React.useRef(null);

  const sprintTasks = React.useMemo(() => {
    const derived = colonias.flatMap(col =>
      col.acciones.map(a => ({
        id: `col::${col.id}::${a.id}`,
        titulo: a.desc,
        descripcion: a.descripcion || '',
        responsable: a.resp || '',
        fecha: a.fecha || '',
        impacto: a.impacto || 3,
        esfuerzo: a.esfuerzo || 3,
        status: ({pendiente:'todo',proceso:'inprogress',hecho:'done'})[a.status] || 'todo',
        isFromColonia: true,
        coloniaId: col.id,
        coloniaName: col.data.colonia || col.data.nombre || Object.values(col.data)[0] || '?',
        accionId: a.id,
      }))
    );
    const standalone = tasks.filter(t => t.status !== 'backlog');
    return [...standalone, ...derived];
  }, [tasks, colonias]);

  const done  = sprintTasks.filter(t=>t.status==='done').length;
  const total = sprintTasks.length;
  const pct   = total ? Math.round(done/total*100) : 0;

  // Days calculation
  function daysDiff() {
    if (!sprint.fechaInicio || !sprint.fechaFin) return null;
    const d = (new Date(sprint.fechaFin) - new Date(sprint.fechaInicio)) / 86400000;
    return Math.round(d);
  }
  const days = daysDiff();

  function handleMove(taskId, newStatus) {
    if (taskId.startsWith('col::')) {
      const parts = taskId.split('::');
      const [,coloniaId, accionId] = parts;
      const sm = {todo:'pendiente',inprogress:'proceso',blocked:'proceso',done:'hecho'};
      setColonias(cs => cs.map(c => c.id!==coloniaId ? c : {
        ...c, acciones: c.acciones.map(a => a.id!==accionId ? a : {...a, status:sm[newStatus]})
      }));
    } else {
      setTasks(ts => ts.map(t => t.id===taskId ? {...t,status:newStatus} : t));
    }
  }
  function handleUpdate(taskId, updates) {
    if (taskId.startsWith('col::')) {
      const parts = taskId.split('::');
      const [,coloniaId, accionId] = parts;
      setColonias(cs => cs.map(c => c.id!==coloniaId ? c : {
        ...c, acciones: c.acciones.map(a => a.id!==accionId ? a : {
          ...a, desc: updates.titulo??a.desc, descripcion:updates.descripcion??a.descripcion,
          resp:updates.responsable??a.resp, fecha:updates.fecha??a.fecha,
        })
      }));
    } else {
      setTasks(ts => ts.map(t => t.id===taskId ? {...t,...updates} : t));
    }
  }
  function handleDelete(taskId) {
    if (taskId.startsWith('col::')) {
      const parts = taskId.split('::');
      const [,coloniaId, accionId] = parts;
      setColonias(cs => cs.map(c => c.id!==coloniaId ? c : {
        ...c, acciones: c.acciones.filter(a => a.id!==accionId)
      }));
    } else {
      setTasks(ts => ts.filter(t => t.id!==taskId));
    }
  }

  const sp = k => v => setSprint(s=>({...s,[k]:v}));

  return (
    <div>
      {/* Sprint Header */}
      <div className="sprint-header">
        <div className="sprint-title-row">
          <h2>Sprint</h2>
          <span className="sprint-num">#{sprint.numero||1}</span>
        </div>
        <div className="sprint-dates">
          <div className="sprint-date-field">
            <svg className="sprint-date-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round">
              <rect x="1.5" y="2.5" width="11" height="10" rx="1.5"/>
              <path d="M1.5 6h11M4.5 1v3M9.5 1v3"/>
            </svg>
            <span className="sprint-date-label">Inicio</span>
            <input type="date" className="sprint-date-input" value={sprint.fechaInicio||''} onChange={e=>sp('fechaInicio')(e.target.value)} onClick={e=>e.target.showPicker&&e.target.showPicker()} />
          </div>
          <span className="sprint-dates-sep">—</span>
          <div className="sprint-date-field">
            <svg className="sprint-date-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round">
              <rect x="1.5" y="2.5" width="11" height="10" rx="1.5"/>
              <path d="M1.5 6h11M4.5 1v3M9.5 1v3"/>
            </svg>
            <span className="sprint-date-label">Fin</span>
            <input type="date" className="sprint-date-input" value={sprint.fechaFin||''} onChange={e=>sp('fechaFin')(e.target.value)} onClick={e=>e.target.showPicker&&e.target.showPicker()} />
          </div>

        </div>
        <input
          className="sprint-objective"
          placeholder="Objetivo del sprint — ¿qué queremos lograr en este período?"
          value={sprint.objetivo||''}
          onChange={e=>sp('objetivo')(e.target.value)}
        />
      </div>

      {/* Sprint sub-tabs */}
      <div className="sprint-view-tabs">
        {[{k:'backlog',l:'Backlog'},{k:'kanban',l:'Tareas'},{k:'review',l:'Revisión'},{k:'retro',l:'Retrospectiva'}].map(t=>(
          <button key={t.k} className={`svt-btn ${sprintTab===t.k?'active':''}`} onClick={()=>setSprintTab(t.k)}>{t.l}</button>
        ))}
      </div>

      {/* Backlog */}
      {sprintTab === 'backlog' && (
        <BacklogView tasks={tasks} setTasks={setTasks} colonias={colonias} team={team} />
      )}

      {/* Kanban */}
      {sprintTab === 'kanban' && (
        <div className="kanban-board">
          {KAN_COLS.map(col => {
            const colTasks = sprintTasks.filter(t => t.status===col.id);
            const isOver = dragOver === col.id;
            return (
              <div
                key={col.id}
                className="kanban-col"
                onDragOver={e=>{ e.preventDefault(); setDragOver(col.id); }}
                onDragLeave={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setDragOver(null); }}
                onDrop={e=>{ e.preventDefault(); if(dragRef.current) handleMove(dragRef.current, col.id); dragRef.current=null; setDragOver(null); }}
              >
                <div className={`kanban-col-header ${col.cls}`}>
                  <span className="kanban-col-label">{col.label}</span>
                  <span className="kanban-col-count">{colTasks.length}</span>
                </div>
                <div className={`kanban-col-body ${isOver?'drag-over':''}`}>
                  {colTasks.length===0 && col.id!=='todo' && <div className="col-empty">Vacío</div>}
                  {colTasks.map(t=>(
                    <TaskCard key={t.id} task={t} onMove={handleMove} onUpdate={handleUpdate} onDelete={handleDelete} dragRef={dragRef} team={team} />
                  ))}
                  {col.id==='todo' && (
                    <AddSprintTask onAdd={data=>setTasks(ts=>[...ts,{id:uid(),status:'todo',...data,impacto:3,esfuerzo:3}])} />
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Review */}
      {sprintTab === 'review' && (
        <div className="review-panel">

          {/* Progress summary removed — per-task bars only */}

          {/* Per-task review table */}
          {sprintTasks.length === 0
            ? <p style={{fontSize:'.85rem',color:'var(--gray-4)',fontWeight:300,padding:'24px 0'}}>No hay tareas en el sprint.</p>
            : (
              <div className="rv-table-wrap">
                {/* Header */}
                <div className="rv-table-head">
                  <div className="rv-col-accion">Acción</div>
                  <div className="rv-col-aprendizajes">Aprendizajes</div>
                  <div className="rv-col-acciones">Acciones nuevas</div>
                </div>
                {/* Rows */}
                {sprintTasks.map(t => {
                  const rev = (sprint.taskReviews||{})[t.id] || {};
                  function upd(k,v) {
                    sp('taskReviews')({...(sprint.taskReviews||{}), [t.id]: {...rev, [k]:v}});
                  }
                  const pctVal = rev.pct ?? (t.status==='done' ? 100 : t.status==='todo' ? 0 : 50);
                  return (
                    <div key={t.id} className="rv-table-row">
                      <div className="rv-col-accion">
                        <div className="rv-accion-title">{t.titulo}</div>
                        {t.responsable && <div className="rv-accion-resp">{t.responsable}</div>}
                        <div style={{marginTop:8}}>
                          <div className="tef-label" style={{marginBottom:3}}>% cumplimiento</div>
                          <select
                            className="rv-pct-select"
                            value={pctVal}
                            onChange={e=>upd('pct', Number(e.target.value))}
                          >
                            {[0,10,25,50,75,90,100].map(p=>(
                              <option key={p} value={p}>{p}%</option>
                            ))}
                          </select>
                          <div className="rv-pct-bar">
                            <div className="rv-pct-fill" style={{width:`${pctVal}%`, background: pctVal===100?'#12cdff': pctVal>=75?'#3ab8d8': pctVal>=50?'#5a9eb8': pctVal>=25?'#6e8a9e':'#8a9daa'}}/>
                          </div>
                        </div>
                      </div>
                      <div className="rv-col-aprendizajes">
                        <textarea
                          className="rv-cell-textarea"
                          rows={4}
                          placeholder="¿Qué aprendimos con esta acción?"
                          value={rev.aprendizajes||''}
                          onChange={e=>upd('aprendizajes',e.target.value)}
                        />
                      </div>
                      <div className="rv-col-acciones">
                        <ReviewTaskAdder
                          sourceTaskId={t.id}
                          sprint={sprint}
                          sp={sp}
                          tasks={tasks}
                          setTasks={setTasks}
                        />
                      </div>
                    </div>
                  );
                })}
              </div>
            )
          }
        </div>
      )}

      {/* Retrospectiva */}
      {sprintTab === 'retro' && (
        <div className="review-panel">
          <div className="retro-table-wrap">
            <div className="retro-table-head">
              <div>✓ Funcionó</div>
              <div>↑ No funcionó</div>
              <div>Acciones</div>
            </div>
            <div className="retro-table-body">
              <div>
                <textarea
                  className="retro-textarea"
                  placeholder="Prácticas, dinámicas y decisiones que funcionaron…"
                  value={sprint.retroBien||''}
                  onChange={e=>sp('retroBien')(e.target.value)}
                />
              </div>
              <div>
                <textarea
                  className="retro-textarea"
                  placeholder="Fricciones, bloqueos y áreas de mejora…"
                  value={sprint.retroMejorar||''}
                  onChange={e=>sp('retroMejorar')(e.target.value)}
                />
              </div>
              <div>
                <RetroTaskAdder tasks={tasks} setTasks={setTasks} />
              </div>
            </div>
          </div>
          <div style={{marginTop:4,paddingTop:16,borderTop:'1px solid var(--gray-5)'}}>
            <button className="form-btn" onClick={()=>setSprint(s=>({...s,numero:(s.numero||1)+1,objetivo:'',fechaInicio:'',fechaFin:'',taskReviews:{},reviewNextActions:[],retroBien:'',retroMejorar:''}))}>
              Cerrar sprint y abrir Sprint #{(sprint.numero||1)+1}
            </button>
          </div>
          <p className="helper-text" style={{marginTop:12}}>Los cambios se guardan automáticamente.</p>
        </div>
      )}
    </div>
  );
}

function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function AssetsView() {
  const [files, setFiles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [uploading, setUploading] = useState(false);
  const [uploadErr, setUploadErr] = useState('');
  const [bucketErr, setBucketErr] = useState('');
  const fileRef = React.useRef();

  async function loadFiles() {
    setLoading(true);
    setBucketErr('');
    const { data, error } = await sb.storage.from(ASSET_BUCKET).list('', { sortBy:{column:'created_at',order:'desc'} });
    if (error) { setBucketErr(error.message); setLoading(false); return; }
    setFiles(data || []);
    setLoading(false);
  }

  React.useEffect(() => { loadFiles(); }, []);

  async function handleUpload(e) {
    const chosen = Array.from(e.target.files || []);
    if (!chosen.length) return;
    setUploading(true);
    setUploadErr('');
    const errors = [];
    for (const file of chosen) {
      const safeName = file.name.replace(/[^a-zA-Z0-9._\-]/g, '_');
      const path = `${Date.now()}_${safeName}`;
      const { error } = await sb.storage.from(ASSET_BUCKET).upload(path, file, { upsert: false });
      if (error) errors.push(error.message);
    }
    setUploading(false);
    if (fileRef.current) fileRef.current.value = '';
    if (errors.length) { setUploadErr(errors[0]); return; }
    await loadFiles();
  }

  async function handleDelete(name) {
    if (!confirm('¿Eliminar este archivo?')) return;
    await sb.storage.from(ASSET_BUCKET).remove([name]);
    setFiles(fs => fs.filter(f => f.name !== name));
  }

  function getUrl(name) {
    const { data } = sb.storage.from(ASSET_BUCKET).getPublicUrl(name);
    return data.publicUrl;
  }

  const realFiles = files.filter(f => f.name !== '.emptyFolderPlaceholder');

  return (
    <div style={{background:'var(--white)',minHeight:'100%'}}>
      <div className="assets-header">
        <div>
          <h2>Assets</h2>
          {!loading && !bucketErr && <p style={{margin:'2px 0 0',fontSize:'.78rem',fontWeight:300,color:'var(--gray-4)'}}>{realFiles.length} archivo{realFiles.length!==1?'s':''}</p>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {uploading && <span style={{fontSize:'.75rem',color:'var(--gray-4)',fontWeight:300}}>Subiendo…</span>}
          <input ref={fileRef} type="file" multiple style={{display:'none'}} onChange={handleUpload} />
          {!bucketErr && (
            <button className="asset-upload-btn" disabled={uploading}
              onClick={()=>{ if(fileRef.current) fileRef.current.click(); }}>
              + Subir archivos
            </button>
          )}
        </div>
      </div>

      {uploadErr && (
        <div style={{margin:'0 32px 16px',padding:'10px 14px',background:'#fff5f5',border:'1px solid #fed7d7',borderRadius:8,fontSize:'.78rem',color:'#c53030',lineHeight:1.5}}>
          <strong>Error al subir:</strong> {uploadErr}
        </div>
      )}

      {loading && <div className="asset-empty">Cargando…</div>}

      {bucketErr && (
        <div style={{padding:'40px 32px',maxWidth:500,margin:'0 auto'}}>
          <div style={{border:'1px solid var(--gray-5)',borderRadius:12,padding:'28px 24px'}}>
            <div style={{fontSize:'.88rem',fontWeight:600,color:'var(--black)',marginBottom:6}}>Bucket no encontrado</div>
            <p style={{fontSize:'.8rem',fontWeight:300,color:'var(--gray-3)',marginBottom:20,lineHeight:1.6}}>
              Necesitas crear el bucket de almacenamiento en Supabase para poder subir archivos.
            </p>
            <div style={{fontSize:'.75rem',fontWeight:600,color:'var(--gray-3)',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:10}}>Pasos</div>
            {[
              'Abre tu proyecto en supabase.com',
              'Ve a Storage en el menú lateral',
              'Haz clic en "New bucket"',
              'Nombre: assets — activa "Public bucket"',
              'Haz clic en "Create bucket" y recarga',
            ].map((step, i) => (
              <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:10}}>
                <div style={{width:22,height:22,borderRadius:'50%',background:'var(--black)',color:'#fff',fontSize:'.65rem',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>{i+1}</div>
                <div style={{fontSize:'.8rem',fontWeight:300,color:'var(--gray-2)',lineHeight:1.5}}>{step}</div>
              </div>
            ))}
            <button className="form-btn" style={{marginTop:16,width:'100%',textAlign:'center'}} onClick={loadFiles}>Reintentar</button>
          </div>
        </div>
      )}

      {!loading && !bucketErr && realFiles.length === 0 && (
        <div className="asset-empty">
          No hay archivos. Sube el primero con el botón de arriba.
        </div>
      )}

      {!loading && !bucketErr && realFiles.length > 0 && (
        <div className="assets-grid">
          {realFiles.map(f => {
            const ext = (f.name.split('.').pop()||'').toLowerCase();
            const url = getUrl(f.name);
            const displayName = f.name.replace(/^\d+_/, '');
            return (
              <div key={f.name} className="asset-card">
                <FileTypeIcon ext={ext} />
                <div className="asset-name" title={displayName}>{displayName}</div>
                {f.metadata?.size != null && <div className="asset-size">{fmtSize(f.metadata.size)}</div>}
                <div className="asset-actions">
                  <a href={url} target="_blank" rel="noopener noreferrer" style={{textDecoration:'none'}}>
                    <button className="asset-btn primary">Abrir</button>
                  </a>
                  <a href={url} download={displayName} style={{textDecoration:'none'}}>
                    <button className="asset-btn">↓</button>
                  </a>
                  <button className="asset-btn" style={{marginLeft:'auto',color:'var(--gray-4)',borderColor:'transparent'}}
                    onClick={()=>handleDelete(f.name)}>×</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function Login({ onLogin }) {
  const [mode, setMode]   = useState('pick'); // 'pick' | 'login' | 'signup' | 'done'
  const [email, setEmail] = useState('');
  const [pass, setPass]   = useState('');
  const [pass2, setPass2] = useState('');
  const [err, setErr]     = useState('');
  const [busy, setBusy]   = useState(false);

  async function submit(e) {
    e.preventDefault(); setErr(''); setBusy(true);
    if (mode === 'login') {
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      setBusy(false);
      if (error) setErr(error.message === 'Invalid login credentials' ? 'Correo o contraseña incorrectos.' : error.message);
      else onLogin();
    } else {
      if (pass !== pass2) { setErr('Las contraseñas no coinciden.'); setBusy(false); return; }
      if (pass.length < 6) { setErr('La contraseña debe tener al menos 6 caracteres.'); setBusy(false); return; }
      const { error } = await sb.auth.signUp({ email, password: pass });
      setBusy(false);
      if (error) setErr(error.message);
      else setMode('done');
    }
  }

  const inputStyle = {width:'100%',boxSizing:'border-box',border:'1px solid #ddd',borderRadius:7,padding:'9px 12px',fontSize:'.9rem',fontFamily:'Quicksand,sans-serif',outline:'none'};

  const cardWrap = {minHeight:'100vh',background:'#f7f7f7',display:'flex',alignItems:'center',justifyContent:'center'};
  const card = {background:'#fff',borderRadius:12,padding:'40px 36px',width:360,boxShadow:'0 2px 24px rgba(0,0,0,.08)',textAlign:'center'};
  const logoEl = <img src="Logo/nano-logo.png" alt="Logo" style={{height:56,marginBottom:28,display:'block',margin:'0 auto 28px'}} />;

  if (mode === 'pick') return (
    <div style={cardWrap}>
      <div style={card}>
        {logoEl}
        <div style={{display:'flex',gap:12,marginTop:8}}>
          <button onClick={()=>setMode('login')}
            style={{flex:1,background:'#fff',color:'#0a0a0a',border:'1.5px solid #ddd',borderRadius:8,padding:'12px',fontFamily:'Quicksand,sans-serif',fontWeight:700,fontSize:'.95rem',cursor:'pointer'}}>
            Iniciar sesión
          </button>
          <button onClick={()=>setMode('signup')}
            style={{flex:1,background:'#e8e8e8',color:'#444',border:'1.5px solid #e8e8e8',borderRadius:8,padding:'12px',fontFamily:'Quicksand,sans-serif',fontWeight:700,fontSize:'.95rem',cursor:'pointer'}}>
            Registrarse
          </button>
        </div>
      </div>
    </div>
  );

  if (mode === 'done') return (
    <div style={cardWrap}>
      <div style={card}>
        {logoEl}
        <div style={{fontSize:'2rem',marginBottom:12}}>✉️</div>
        <div style={{fontWeight:700,fontSize:'1.1rem',marginBottom:8}}>Revisa tu correo</div>
        <div style={{color:'#888',fontSize:'.85rem',lineHeight:1.6,marginBottom:24}}>Te enviamos un link de confirmación a <strong>{email}</strong>. Haz clic en él para activar tu cuenta.</div>
        <button onClick={()=>{ setMode('pick'); setErr(''); setPass(''); setPass2(''); }}
          style={{background:'none',border:'none',color:'#0a0a0a',fontSize:'.85rem',fontWeight:600,cursor:'pointer',textDecoration:'underline'}}>
          Volver al inicio
        </button>
      </div>
    </div>
  );

  return (
    <div style={cardWrap}>
      <div style={{...card, textAlign:'left'}}>
        {logoEl}
        <div style={{marginBottom:24}}>
          <div style={{fontFamily:'Quicksand,sans-serif',fontWeight:700,fontSize:'1.2rem',color:'#0a0a0a',letterSpacing:'-.02em'}}>
            {mode === 'login' ? 'Acceso' : 'Crear cuenta'}
          </div>
          <div style={{color:'#888',fontSize:'.82rem',marginTop:4}}>
            {mode === 'login' ? 'Ingresa con tu cuenta' : 'Regístrate para acceder'}
          </div>
        </div>
        <form onSubmit={submit}>
          <div style={{marginBottom:14}}>
            <label style={{display:'block',fontSize:'.75rem',fontWeight:600,color:'#444',marginBottom:5,letterSpacing:'.04em',textTransform:'uppercase'}}>Correo</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required style={inputStyle} />
          </div>
          <div style={{marginBottom: mode==='signup' ? 14 : 22}}>
            <label style={{display:'block',fontSize:'.75rem',fontWeight:600,color:'#444',marginBottom:5,letterSpacing:'.04em',textTransform:'uppercase'}}>Contraseña</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} required style={inputStyle} />
          </div>
          {mode === 'signup' && (
            <div style={{marginBottom:22}}>
              <label style={{display:'block',fontSize:'.75rem',fontWeight:600,color:'#444',marginBottom:5,letterSpacing:'.04em',textTransform:'uppercase'}}>Confirmar contraseña</label>
              <input type="password" value={pass2} onChange={e=>setPass2(e.target.value)} required style={inputStyle} />
            </div>
          )}
          {err && <div style={{background:'#fff0f0',color:'#c00',borderRadius:6,padding:'8px 12px',fontSize:'.8rem',marginBottom:14}}>{err}</div>}
          <button type="submit" disabled={busy}
            style={{width:'100%',background:'#0a0a0a',color:'#fff',border:'none',borderRadius:7,padding:'11px',fontFamily:'Quicksand,sans-serif',fontWeight:600,fontSize:'.9rem',cursor:busy?'not-allowed':'pointer',opacity:busy?.6:1}}>
            {busy ? (mode==='login' ? 'Entrando...' : 'Creando cuenta...') : (mode==='login' ? 'Entrar' : 'Crear cuenta')}
          </button>
        </form>
        <div style={{textAlign:'center',marginTop:18,fontSize:'.82rem',color:'#888'}}>
          {mode === 'login'
            ? <span>¿No tienes cuenta? <button onClick={()=>{setMode('signup');setErr('');}} style={{background:'none',border:'none',color:'#0a0a0a',fontWeight:600,cursor:'pointer',fontSize:'.82rem',fontFamily:'Quicksand,sans-serif',padding:0}}>Regístrate</button></span>
            : <span>¿Ya tienes cuenta? <button onClick={()=>{setMode('login');setErr('');}} style={{background:'none',border:'none',color:'#0a0a0a',fontWeight:600,cursor:'pointer',fontSize:'.82rem',fontFamily:'Quicksand,sans-serif',padding:0}}>Inicia sesión</button></span>
          }
        </div>
      </div>
    </div>
  );
}


function App() {
  const [colonias, setColonias] = useState([]);
  const [loaded, setLoaded]     = useState(false);
  const [search, setSearch]     = useState('');
  const [filter, setFilter]     = useState('todas');
  const [sortBy, setSortBy]     = useState('fecha');
  const [showModal, setShowModal] = useState(false);
  const [csvRaw,    setCsvRaw]    = useState(null);   // raw parsed rows
  const [csvHeaders,setCsvHeaders]= useState([]);     // columns from file
  const [mapping,   setMapping]   = useState({});     // appField -> csvCol
  const [importStep,setImportStep]= useState('upload'); // 'upload'|'map'
  const [campName, setCampName]   = useState('Mi Campã±a');
  const [editName, setEditName]   = useState(false);
  const [tmpName, setTmpName]     = useState('');
  const [menuOpen, setMenuOpen] = useState(false);
  const [view, setView] = useState('colonias');
  const [team, setTeam] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [sprint, setSprint] = useState({ numero:1, objetivo:'', fechaInicio:'', fechaFin:'', taskReviews:{}, reviewNextActions:[], retroBien:'', retroMejorar:'' });
  const [user, setUser]         = useState(null);
  const [appLoading, setAppLoading] = useState(true);
  const [minLoadDone, setMinLoadDone] = useState(false);
  const [fadingOut, setFadingOut] = useState(false);
  const fileRef = useRef();

  /* ── Supabase write wrappers ── */
  function sbColonias(updater) {
    setColonias(prev => {
      const next = typeof updater==='function' ? updater(prev) : updater;
      const prevMap = new Map((prev||[]).map(x=>[x.id,x]));
      const nextMap = new Map(next.map(x=>[x.id,x]));
      next.forEach(x => { const p=prevMap.get(x.id); if(!p||JSON.stringify(p)!==JSON.stringify(x)) sb.from('colonias').upsert(x).then(); });
      (prev||[]).forEach(x => { if(!nextMap.has(x.id)) sb.from('colonias').delete().eq('id',x.id).then(); });
      return next;
    });
  }
  function sbTasks(updater) {
    setTasks(prev => {
      const next = typeof updater==='function' ? updater(prev) : updater;
      const prevMap = new Map((prev||[]).map(x=>[x.id,x]));
      const nextMap = new Map(next.map(x=>[x.id,x]));
      next.forEach(x => { const p=prevMap.get(x.id); if(!p||JSON.stringify(p)!==JSON.stringify(x)) sb.from('tasks').upsert(taskToDb(x)).then(); });
      (prev||[]).forEach(x => { if(!nextMap.has(x.id)) sb.from('tasks').delete().eq('id',x.id).then(); });
      return next;
    });
  }
  function sbTeam(updater) {
    setTeam(prev => {
      const next = typeof updater==='function' ? updater(prev) : updater;
      const prevMap = new Map((prev||[]).map(x=>[x.id,x]));
      const nextMap = new Map(next.map(x=>[x.id,x]));
      next.forEach(x => { const p=prevMap.get(x.id); if(!p||JSON.stringify(p)!==JSON.stringify(x)) sb.from('equipo').upsert(memberToDb(x)).then(); });
      (prev||[]).forEach(x => { if(!nextMap.has(x.id)) sb.from('equipo').delete().eq('id',x.id).then(); });
      return next;
    });
  }
  function sbSprint(updater) {
    setSprint(prev => {
      const next = typeof updater==='function' ? updater(prev) : updater;
      sb.from('sprint').upsert(sprintToDb(next)).then();
      return next;
    });
  }

  /* ── Auth + data load ── */
  useEffect(() => {
    setTimeout(() => setFadingOut(true), 3200);
    setTimeout(() => setMinLoadDone(true), 4200);
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) { setUser(session.user); loadData(); }
      else setAppLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      if (event==='SIGNED_IN') { setUser(session.user); loadData(); }
      if (event==='SIGNED_OUT') { setUser(null); setColonias([]); setTeam([]); setTasks([]); setLoaded(false); setAppLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  async function fetchAllColonias() {
    const PAGE = 1000;
    let all = [], from = 0, done = false;
    while (!done) {
      const { data } = await sb.from('colonias').select('*').range(from, from + PAGE - 1);
      if (data && data.length) { all = all.concat(data); from += PAGE; if (data.length < PAGE) done = true; }
      else done = true;
    }
    return all;
  }

  async function loadData() {
    setAppLoading(true);
    const [allColonias, teamRes, taskRes, sprintRes] = await Promise.all([
      fetchAllColonias(),
      sb.from('equipo').select('*'),
      sb.from('tasks').select('*'),
      sb.from('sprint').select('*').eq('id',1).maybeSingle()
    ]);
    if (allColonias.length) { setColonias(allColonias); setLoaded(true); }
    if (teamRes.data?.length) setTeam(teamRes.data.map(m=>({...m, correo:m.email||''})));
    if (taskRes.data?.length) setTasks(taskRes.data);
    if (sprintRes.data) setSprint(sprintFromDb(sprintRes.data));
    setAppLoading(false);
    sb.channel('realtime-app')
      .on('postgres_changes',{event:'*',schema:'public',table:'colonias'},({eventType:et,new:n,old:o})=>{
        if(et==='DELETE') setColonias(cs=>cs.filter(c=>c.id!==o.id));
        else { setColonias(cs=>{const i=cs.findIndex(c=>c.id===n.id);return i>=0?cs.map(c=>c.id===n.id?n:c):[...cs,n];}); setLoaded(true); }
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'equipo'},({eventType:et,new:n,old:o})=>{
        if(et==='DELETE') setTeam(ts=>ts.filter(m=>m.id!==o.id));
        else setTeam(ts=>{const m={...n,correo:n.email||''};const i=ts.findIndex(x=>x.id===n.id);return i>=0?ts.map(x=>x.id===n.id?m:x):[...ts,m];});
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},({eventType:et,new:n,old:o})=>{
        if(et==='DELETE') setTasks(ts=>ts.filter(t=>t.id!==o.id));
        else setTasks(ts=>{const i=ts.findIndex(t=>t.id===n.id);return i>=0?ts.map(t=>t.id===n.id?n:t):[...ts,n];});
      })
      .on('postgres_changes',{event:'*',schema:'public',table:'sprint'},({new:n})=>{
        if(n) setSprint(sprintFromDb(n));
      })
      .subscribe();
  }

  async function load(text) {
    const parsed = parseCsv(text);
    await sb.from('colonias').upsert(parsed);
    setColonias(parsed); setLoaded(true); setShowModal(false);
  }

  function handleFile(e) {
    var files = e.target.files;
    if (!files || !files.length) return;
    var f = files[0];
    Papa.parse(f, {
      header: true,
      skipEmptyLines: true,
      transformHeader: function(h) { return h.trim(); },
      complete: function(parsed) {
        var headers = (parsed.meta && parsed.meta.fields) ? parsed.meta.fields : [];
        if (!headers.length) { alert('No se detectaron columnas.'); return; }
        var PAIRS = [['colonia','Colonia'],['categoria','Categoría'],['tier','Tier'],
          ['votos_ganar','Votos a ganar'],['volumen_impactos','Volumen impactos'],
          ['id_csv','ID'],['fase','Fase'],['semana','Sem'],['fecha','Fecha'],
          ['dia','Día'],['franja','Franja'],['canal','Canal'],['impacto_ntotal','Impacto n/total']];
        var auto = {};
        PAIRS.forEach(function(pair) {
          var appF = pair[0]; var csvName = pair[1];
          var match = headers.find(function(h){ return h.trim() === csvName; });
          if (!match) match = headers.find(function(h){ return h.trim().toLowerCase() === csvName.toLowerCase(); });
          if (match) auto[match] = appF;
        });
        setCsvRaw(parsed.data);
        setCsvHeaders(headers);
        setMapping(auto);
        setShowModal(true);
        setImportStep('map');
      },
      error: function(err) { alert('Error al leer CSV: ' + err.message); }
    });
  }

  function applyMapping() {
    // mapping = { csvHeader: appField }
    const rows = csvRaw.map(raw => {
      const data = {};
      Object.keys(raw).forEach(csvH => {
        const appF = mapping[csvH];
        const val = (raw[csvH] != null && raw[csvH] !== undefined) ? String(raw[csvH]).trim() : '';
        if (appF) { data[appF] = val; }
        else { data[csvH.toLowerCase().trim().replace(/\s+/g,'_')] = val; }
      });
      return data;
    });
    const colonias = rows.map(data => ({ id:uid(), data, estrategia:'', acciones:[], notas:'', estado:'pendiente', insights:[] }));
    const BATCH = 500;
    (function insertBatch(i) {
      if (i >= colonias.length) return;
      sb.from('colonias').insert(colonias.slice(i, i + BATCH)).then(() => insertBatch(i + BATCH));
    })(0);
    setColonias(colonias); setLoaded(true); setShowModal(false);
    setCsvRaw(null); setCsvHeaders([]); setMapping({}); setImportStep('upload');
  }

    const p = str.split('-');
    if (p.length === 3) {
      const d = parseInt(p[0]), m = meses[p[1].toLowerCase()], y = parseInt(p[2]);
      if (!isNaN(d) && m !== undefined && !isNaN(y)) return new Date(y, m, d);
    }
    const dt = new Date(str);
    return isNaN(dt) ? new Date(0) : dt;
  }

    let r = colonias;

      r = r.filter(c => Object.values(c.data).some(v => v.toLowerCase().includes(q)));

    if (sortBy) {
      r = [...r].sort((a, b) => {
        if (sortBy === 'fecha') return parseFecha(a.data.fecha) - parseFecha(b.data.fecha);

        const bv = (b.data[sortBy] || '').toString();

      });
    }
    return r;
  }, [colonias, filter, search, sortBy]);

  // Group by municipio (or first column if none)
  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach(c => {
      const key = (c.data.tier && c.data.tier !== '—') ? c.data.tier : 'Sin tier';
      if (!map[key]) map[key] = [];

      if (a === 'Sin tier') return -1;

    });
  }, [filtered]);

  const total      = colonias.length;
  const visitadas  = colonias.filter(c=>c.estado==='visitada').length;
  const proceso    = colonias.filter(c=>c.estado==='proceso').length;
  const pendientes = colonias.filter(c=>c.estado==='pendiente').length;
  const totalVotos = colonias.reduce((s,c)=>s+(Number(c.data.votos_ganar)||0),0);
  const totalImpactos = colonias.reduce((s,c)=>s+(Number(c.data.volumen_impactos)||0),0);
  const impactosHechos = colonias.reduce((s,c)=>s+c.acciones.filter(a=>a.status==='hecho').length,0);

  if (appLoading || !minLoadDone) return (
    <div style={{
      display:'flex',alignItems:'center',justifyContent:'center',
      height:'100vh',background:'#fff',
      opacity: fadingOut ? 0 : 1,
      transition: fadingOut ? 'opacity 1s ease' : 'none',
      pointerEvents:'none'

          <button className={`hamburger open`} onClick={()=>setMenuOpen(false)} aria-label="Cerrar">
            <span/><span/><span/>
          </button>
        </div>
        <div className="mobile-menu-links">
          {[
            { v:'colonias', l:'Colonias' },
            { v:'sprint',   l:'Sprints' },
            { v:'equipo',   l:'Equipo' },
            { v:'assets',   l:'Assets' },
          ].map(item => (
            <div
              key={item.v}
              className={`mobile-menu-link ${view===item.v?'active':''}`}
              onClick={()=>{ setView(item.v); setMenuOpen(false); }}
            >
              {item.l}
              <svg className="ml-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M6 4l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
          ))}
        </div>
        {view==='colonias' && (
          <div className="mobile-menu-footer">
            <button className="topnav-btn" style={{width:'100%',padding:'10px'}} onClick={()=>{ setShowModal(true); setMenuOpen(false); }}>Importar CSV</button>
          </div>
        )}
      </div>

      {/* Sprint */}
      {view === 'sprint' && (
        <div className="main-content">
          <SprintBoard
            tasks={tasks}
            setTasks={sbTasks}
            colonias={colonias}
            setColonias={sbColonias}
            team={team}
            sprint={sprint}
            setSprint={sbSprint}
          />
        </div>
      )}

      {/* Search - only colonias */}
      {loaded && view === 'colonias' && (
        <div className="searchbar">
          <h2 style={{margin:0,fontSize:'1.8rem',fontWeight:600,letterSpacing:'-.04em',color:'var(--black)',flexShrink:0}}>Colonias</h2>
          <input type="text" placeholder="Buscar colonia, categoría, tier…" value={search} onChange={e=>setSearch(e.target.value)} />
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <select value={filter} onChange={e=>setFilter(e.target.value)}
              style={{fontFamily:"'Quicksand',sans-serif",fontSize:'.8rem',fontWeight:500,
                color:'var(--gray-2)',background:'transparent',border:'none',
                outline:'none',cursor:'pointer'}}>
              <option value="todas">Todas</option>
              <option value="pendiente">Pendientes</option>
              <option value="proceso">En proceso</option>
              <option value="visitada">Visitadas</option>
            </select>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
              style={{fontFamily:"'Quicksand',sans-serif",fontSize:'.8rem',fontWeight:500,
                color:'var(--gray-2)',background:'transparent',border:'none',
                outline:'none',cursor:'pointer'}}>
              <option value="fecha">Fecha</option>
              <option value="colonia">Colonia</option>
              <option value="tier">Tier</option>
              <option value="categoria">Categoría</option>
              <option value="fase">Fase</option>
              <option value="semana">Sem</option>
              <option value="votos_ganar">Votos</option>
              <option value="estado">Estado</option>
            </select>
            <button onClick={()=>setShowModal(true)}
              style={{fontFamily:"'Quicksand',sans-serif",fontSize:'.75rem',fontWeight:600,
                padding:'4px 14px',borderRadius:20,border:'1px solid var(--gray-4)',
                background:'transparent',color:'var(--gray-2)',cursor:'pointer',
                letterSpacing:'.02em',transition:'all .15s',whiteSpace:'nowrap'}}
              onMouseEnter={e=>{e.target.style.background='var(--black)';e.target.style.color='#fff';e.target.style.borderColor='var(--black)'}}
              onMouseLeave={e=>{e.target.style.background='transparent';e.target.style.color='var(--gray-2)';e.target.style.borderColor='var(--gray-4)'}}>
              Importar CSV
            </button>
            <button onClick={()=>{ if(!window.confirm('¿Borrar todas las colonias? Esta acción no se puede deshacer.')) return; sb.from('colonias').delete().neq('id','__none__').then(); setColonias([]); setLoaded(false); }}
              style={{fontFamily:"'Quicksand',sans-serif",fontSize:'.75rem',fontWeight:600,
                padding:'4px 14px',borderRadius:20,border:'1px solid #ffbdbd',
                background:'transparent',color:'#e05555',cursor:'pointer',
                letterSpacing:'.02em',transition:'all .15s',whiteSpace:'nowrap'}}
              onMouseEnter={e=>{e.target.style.background='#e05555';e.target.style.color='#fff';e.target.style.borderColor='#e05555'}}
              onMouseLeave={e=>{e.target.style.background='transparent';e.target.style.color='#e05555';e.target.style.borderColor='#ffbdbd'}}>

        </div>

              <MemberCard
                key={m.id}
                member={m}
                onUpdate={updated => sbTeam(t => t.map(x => x.id===updated.id ? updated : x))}
                onDelete={id => sbTeam(t => t.filter(x => x.id !== id))}
              />
            ))}
            <AddCard onAdd={m => sbTeam(t => [...t, m])} />
          </div>
        </div>

            <h2>Sistema de Campaña</h2>
            <p>Importa tu CSV con las colonias a visitar o usa los datos de ejemplo para explorar el sistema.</p>
            <div style={{width:'100%', maxWidth:'460px'}}>
              <label className="upload-zone">
                <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={handleFile} />
                <h3>Importar archivo CSV</h3>
                <p>Haz clic para seleccionar tu archivo.<br/>La primera fila debe contener los nombres de columna.</p>
              </label>

            </div>
          </div>
        ) : grouped.length === 0 ? (
          <div className="no-results">Sin resultados para esta búsqueda.</div>
        ) : (
          <div className="colonias-wrap">
            {grouped.map(([tierKey, cols]) => (
              <div key={tierKey} className="group-block">
                <div className="colonia-list">
                  {cols.map(col => <ColoniaRow key={col.id} col={col} onUpdate={upd} team={team} />)}
                </div>
              </div>
            ))}
          </div>
        )
      )}

      {/* Footer */}
      {loaded && (
        <div className="app-footer">
          <span className="footer-text">{campName} — Sistema de Coordinación de Campaña</span>
          <span className="footer-text">{visitadas} de {total} colonias visitadas · {impactosHechos}/{totalImpactos} impactos</span>
        </div>
      )}

      {/* Modal */}
      {showModal && (
        <div className="modal-overlay" onClick={e => { if(e.target===e.currentTarget){ setShowModal(false); setImportStep('upload'); } }}>
          <div className="modal" style={{maxWidth: importStep==='map' ? 560 : 420}}>
            <div className="modal-header">
              <h2 className="modal-title">{importStep==='upload' ? 'Importar colonias' : 'Mapear columnas'}</h2>
              <button className="close-btn" onClick={() => { setShowModal(false); setImportStep('upload'); }}>×</button>
            </div>

            {importStep==='upload' ? (
              <>
                <label className="upload-zone" style={{padding:'28px 24px',cursor:'pointer'}} htmlFor="csv-file-input">
                  <h3>Seleccionar archivo CSV</h3>
                  <p>Primera fila = encabezados de columna.<br/>Codificación recomendada: UTF-8.</p>
                  <p style={{marginTop:8,fontSize:'.75rem',color:'var(--accent)',fontWeight:600}}>Clic para elegir archivo</p>
                </label>
                <input id="csv-file-input" type="file" accept=".csv,.txt" style={{display:'none'}} onChange={handleFile} />

              </>
            ) : (
              <>
                <p style={{fontSize:'.75rem',color:'var(--gray-3)',marginBottom:16}}>
                  {csvRaw?.length} filas detectadas. Asigna cada campo de la app a la columna de tu CSV.
                </p>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px 16px',marginBottom:20,maxHeight:'55vh',overflowY:'auto',paddingRight:4}}>
                  {csvHeaders.map(csvH => (
                    <div key={csvH} style={{display:'flex',flexDirection:'column',gap:3}}>
                      <label style={{fontSize:'.62rem',fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--gray-3)'}}>{csvH}</label>
                      <select
                        value={mapping[csvH] || ''}
                        onChange={e => setMapping(m => ({...m, [csvH]: e.target.value || undefined}))}
                        style={{fontFamily:"'Quicksand',sans-serif",fontSize:'.8rem',border:'1px solid var(--gray-5)',borderRadius:5,padding:'5px 8px',background:'var(--white)',outline:'none',color:'var(--black)'}}>
                        <option value="">— ignorar —</option>
                        <option value="colonia">Colonia</option>
                        <option value="categoria">Categoría</option>
                        <option value="tier">Tier</option>
                        <option value="votos_ganar">Votos a ganar</option>
                        <option value="volumen_impactos">Volumen impactos</option>
                        <option value="id_csv">ID</option>
                        <option value="fase">Fase</option>
                        <option value="semana">Sem</option>
                        <option value="fecha">Fecha</option>
                        <option value="dia">Día</option>
                        <option value="franja">Franja</option>
                        <option value="canal">Canal</option>
                        <option value="impacto_ntotal">Impacto n/total</option>
                      </select>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:10}}>
                  <button className="form-btn" style={{flex:1,padding:'10px'}} onClick={applyMapping}>
                    Importar {csvRaw?.length} colonias
                  </button>
                  <button className="form-btn-ghost" style={{padding:'10px 16px'}} onClick={() => setImportStep('upload')}>
                    ← Volver
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
